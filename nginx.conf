server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let the client router handle deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
